# ═══════════════════════════════════════════════════════════════════════════
# Grafana — Dashboard 自动加载配置
# ═══════════════════════════════════════════════════════════════════════════

apiVersion: 1

providers:
  - name: "Mneme3"
    orgId: 1
    folder: "Mneme3"
    folderUid: "mneme3"
    type: file
    disableDeletion: true
    updateIntervalSeconds: 30
    allowUiUpdates: false
    options:
      path: /etc/grafana/provisioning/dashboards
      foldersFromFilesStructure: false
