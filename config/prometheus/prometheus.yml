# ═══════════════════════════════════════════════════════════════════════════
# Prometheus — Mneme3 指标采集配置
# ═══════════════════════════════════════════════════════════════════════════

global:
  scrape_interval:     15s
  evaluation_interval: 15s
  external_labels:
    service: "mneme3"
    env: "production"

# ── Alertmanager ──────────────────────────────────────────────────────────
alerting:
  alertmanagers:
    - static_configs:
        - targets:
          # - alertmanager:9093

# ── Rule files ────────────────────────────────────────────────────────────
rule_files:
  - "alerts.yml"

# ── Scrape targets ────────────────────────────────────────────────────────
scrape_configs:
  # ── Mneme API ───────────────────────────────────────────────────────────
  - job_name: "mneme-api"
    metrics_path: "/metrics"
    scheme: http
    static_configs:
      - targets:
          - "api:8000"
        labels:
          component: "api"

  # ── Mneme Worker ────────────────────────────────────────────────────────
  # Worker does not expose an HTTP port; metrics are collected via the API.
  # To enable worker metrics, start a sidecar HTTP server in the worker process.
  # - job_name: "mneme-worker"
  #   metrics_path: "/metrics"
  #   scheme: http
  #   static_configs:
  #     - targets:
  #         - "worker:8001"
  #       labels:
  #         component: "worker"

  # ── PostgreSQL ──────────────────────────────────────────────────────────
  - job_name: "postgres"
    static_configs:
      - targets:
          - "postgres-exporter:9187"
        labels:
          component: "database"

  # ── Redis ───────────────────────────────────────────────────────────────
  - job_name: "redis"
    static_configs:
      - targets:
          - "redis-exporter:9121"
        labels:
          component: "cache"

  # ── Node (host-level metrics) ───────────────────────────────────────────
  - job_name: "node"
    static_configs:
      - targets:
          - "node-exporter:9100"
        labels:
          component: "host"

  # ── Docker / Container metrics ──────────────────────────────────────────
  - job_name: "cadvisor"
    static_configs:
      - targets:
          - "cadvisor:8080"
        labels:
          component: "container"

  # ── Self-monitoring (Prometheus itself) ─────────────────────────────────
  - job_name: "prometheus"
    static_configs:
      - targets:
          - "localhost:9090"
